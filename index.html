<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Para Vale ❤️</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect"

<body>

<div id="background"></div>

<div id="petals"></div>

<div class="container">

<div class="scene" id="scene1">

        <h1 id="titulo"></h1>

        <p id="texto"></p>

        <button id="btn">

    </div>

</div>

    <div class="envelope">

        <div class="shadow"></div>

        <div class="letter" id="letter">

    <h2 id="letterTitle"></h2>

    <div id="letterText"></div>

    <button id="continueBtn">
        Continuar ❤️
    </button>

</div>

        <div class="front"></div>

        <div class="flap"></div>

    </div>

</div>

</div>
