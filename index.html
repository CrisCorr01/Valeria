<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Para Vale ❤️</title>

    <meta name="theme-color" content="#f8c8dc">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Cormorant+Garamond:wght@400;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- Fondo -->

    <div id="background"></div>



    <!--==========================================
                    ESCENA 1
        Bienvenida
    ===========================================-->

    <section class="scene active" id="scene1">

        <div class="container">

            <div class="card">

                <h1 id="titulo"></h1>

                <p id="texto"></p>

                <button id="btn">

                    Continuar ❤️

                </button>

                <small id="firma">

                    Hecho con mucho cariño para ti.

                </small>

            </div>

        </div>

    </section>



    <!--==========================================
                    ESCENA 2
                    SOBRE
    ===========================================-->

    <section class="scene hidden" id="scene2">

        <div class="container">

            <div class="envelope">

                <div class="shadow"></div>

                <div class="back"></div>

                <div class="letter-mini"></div>

                <div class="front"></div>

                <div class="flap"></div>

            </div>

        </div>

    </section>



    <!--==========================================
                    ESCENA 3
                    CARTA
    ===========================================-->

    <section class="scene hidden" id="scene3">

        <div class="container">

            <div class="letter-full">

                <h2 id="letterTitle"></h2>

                <div id="letterText"></div>

                <button id="continueBtn">

                    Continuar ❤️

                </button>

            </div>

        </div>

    </section>



    <!--==========================================
                    ESCENA 4
                    PISTA
    ===========================================-->
    
    <section class="scene hidden" id="scene4">
    
        <div class="container">
    
            <div class="card">
    
                <h1 id="hintTitle"></h1>
    
                <p id="hintText"></p>
    
                <!-- Las tres cartas -->
                <div id="letters">
    
                    <div class="mail">📩</div>
    
                    <div class="mail">📩</div>
    
                    <div class="mail">📩</div>
    
                </div>
    
                <button id="gameBtn">
    
                    Ya encontré el secreto 🌸
    
                </button>
    
            </div>
    
        </div>
    
    </section>



    <!--==========================================
                    ESCENA 5
                    MENSAJE
    ===========================================-->

    <section class="scene hidden" id="scene5">

        <div class="container">

            <div class="card">

                <h1 id="finalTitle"></h1>

                <p id="finalMessage"></p>

            </div>

        </div>

    </section>



    <!--==========================================
                    LIBRERÍAS
    ===========================================-->

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>

    <script src="script.js"></script>

</body>

</html>
