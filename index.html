<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Para Vale ❤️</title>

    <meta name="theme-color" content="#f8c8dc">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- Fondo -->
    <div id="background"></div>

    <!-- Contenedor de pétalos -->
    <div id="petals"></div>

    <!-- ===========================
            ESCENA 1
    ============================ -->

    <section class="scene" id="scene1">

        <div class="container">

            <div class="card" id="welcomeCard">

                <h1 id="titulo"></h1>

                <p id="texto"></p>

                <button id="btn">

                    Comenzar ❤️

                </button>

            </div>

        </div>

    </section>



    <!-- ===========================
            ESCENA 2
    ============================ -->

    <section class="scene hidden" id="scene2">

        <div class="envelope">

            <div class="shadow"></div>

            <div class="back"></div>

            <div class="letter" id="letter">

                <h2 id="letterTitle">

                    Para Vale ❤️

                </h2>

                <div id="letterText">

                    Hay un pequeño secreto esperándote...

                </div>

                <button id="continueBtn">

                    Continuar ❤️

                </button>

                <!-- Sello -->

                <div class="seal">

                    ❤️

                </div>

            </div>

            <div class="front"></div>

            <div class="flap"></div>

        </div>

    </section>



    <!-- ===========================
            ESCENA 3
            (La construiremos
             en la Fase 3)
    ============================ -->

    <section class="scene hidden" id="scene3">

        <div class="card">

            <h1>

                Hay un pequeño reto...

            </h1>

            <p>

                Vuelve a leer las tres cartas.

                <br><br>

                Pero esta vez...

                <br><br>

                Lee únicamente las letras escritas en

                <strong>MAYÚSCULA.</strong>

            </p>

            <button id="gameBtn">

                Ya lo descubrí ❤️

            </button>

        </div>

    </section>



    <!-- ===========================
            ESCENA 4
    ============================ -->

    <section class="scene hidden" id="scene4">

        <div class="card">

            <h1 id="finalTitle">

            </h1>

            <p id="finalMessage">

            </p>

        </div>

    </section>



    <!-- Librería GSAP -->

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>

    <!-- Nuestro JavaScript -->

    <script src="script.js"></script>

</body>

</html>
